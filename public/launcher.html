<!DOCTYPE html>
<html>
<head>
<title>Fast Mail Launcher</title>
<link rel="stylesheet" href="style.css">
</head>

<body ondblclick="logout()">

<div class="card">
<h2>🚀 Fast Mail Launcher</h2>

<input id="senderName" placeholder="Sender Name">
<input id="email" placeholder="Your Gmail">
<input id="password" placeholder="App Password">
<input id="subject" placeholder="Subject">

<textarea id="message" placeholder="Message"></textarea>
<textarea id="recipients" placeholder="Recipients"></textarea>

<button onclick="sendMail()">Send All</button>
<button onclick="logout()">Logout</button>

</div>

<script src="script.js"></script>
</body>
</html>
