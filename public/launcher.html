<!DOCTYPE html>
<html>
<head>
  <title>Launcher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
if (!sessionStorage.getItem("auth")) {
  location.href = "/";
}
</script>

<div class="page">
  <div class="card">

    <h2 class="title">Fast Mail Launcher</h2>

    <div class="form-grid">
      <input id="senderName" placeholder="Sender Name">
      <input id="gmail" placeholder="Your Gmail">

      <input id="apppass" type="password" placeholder="App Password">
      <input id="subject" placeholder="Subject">

      <textarea id="message" placeholder="Message"></textarea>
      <textarea id="to" placeholder="Recipients"></textarea>
    </div>

    <div class="btn-row">
      <button id="sendBtn">Send All</button>
      <button onclick="logout()">Logout</button>
    </div>

  </div>
</div>

<script src="script.js"></script>
<script>
function logout(){
  sessionStorage.clear();
  location.href="/";
}
</script>

</body>
</html>
