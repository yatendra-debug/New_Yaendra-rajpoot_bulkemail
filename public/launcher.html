<!DOCTYPE html>
<html>
<head>
  <title>Safe Mail Launcher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
// 🔥 FIXED CHECK
const isLogged = localStorage.getItem("login");

if (isLogged !== "true") {
  window.location.href = "/";
}
</script>

<div class="page">
  <div class="card">

    <h2 class="title"> YATENDRA </h2>

    <div class="form-grid">
      <input id="senderName" placeholder="Sender Name">
      <input id="gmail" placeholder="Your Gmail">

      <input id="apppass" type="password" placeholder="App Password">
      <input id="subject" placeholder="Subject">

      <textarea id="message" placeholder="Message Body"></textarea>
      <textarea id="to" placeholder="Recipients"></textarea>
    </div>

    <div class="btn-row">
      <button id="sendBtn">Send All</button>

      <div class="logout-box">
        <button id="logoutBtn">Logout</button>
        <div class="logout-text">Double-click to logout</div>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>

<script>
// 🔥 FIXED LOGOUT
document.getElementById("logoutBtn").ondblclick = () => {
  localStorage.removeItem("login");
  window.location.href = "/";
};
</script>

</body>
</html>
