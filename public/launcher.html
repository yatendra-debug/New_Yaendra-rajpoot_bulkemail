<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">

  <div class="row">
    <input id="name" placeholder="Sender Name">
    <input id="email" placeholder="Your Gmail">
  </div>

  <div class="row">
    <input id="pass" placeholder="App Password">
    <input id="subject" placeholder="Subject">
  </div>

  <div class="row">
    <textarea id="message" class="big"></textarea>
    <textarea id="recipients"></textarea>
  </div>

  <button id="sendBtn" onclick="send()">Send All</button>
  <button ondblclick="logout()">Logout</button>

</div>

<script src="script.js"></script>
</body>
</html>
