<!DOCTYPE html>
<html>
<head>
  <title>Fast Mail Launcher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">
  <div class="card">

    <h2 class="title">📧 Safe Mail Launcher</h2>

    <div class="form-grid">
      <input id="senderName" placeholder="Sender Name">
      <input id="gmail" placeholder="Your Gmail">

      <input id="apppass" type="password" placeholder="App Password">
      <input id="subject" placeholder="Subject">

      <textarea id="message" placeholder="Message Body"></textarea>
      <textarea id="to" placeholder="Recipients (comma or newline)"></textarea>
    </div>

    <div class="btn-row">
      <button id="sendBtn">Send All</button>

      <div class="logout-box">
        <button id="logoutBtn">Logout</button>
        <div class="logout-text">Double-click to logout</div>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
