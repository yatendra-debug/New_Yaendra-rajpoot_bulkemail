<!DOCTYPE html>
<html>
<head>
<title>Fast Mail Launcher</title>
<link rel="stylesheet" href="style.css">
</head>

<body ondblclick="logout()">

<div class="card">
<h2>📧 Fast Mail Launcher</h2>

<div class="row">
<input id="senderName" placeholder="Sender Name">
<input id="email" placeholder="Your Gmail">
</div>

<div class="row">
<input id="password" placeholder="App Password">
<input id="subject" placeholder="Subject">
</div>

<div class="row">
<textarea id="message" placeholder="Message Body"></textarea>
<textarea id="recipients" placeholder="Recipients (comma or newline)"></textarea>
</div>

<button onclick="sendMail()">Send All</button>
<button onclick="logout()">Logout</button>

<p style="font-size:12px;">Double-click anywhere to logout</p>

</div>

<script src="script.js"></script>
</body>
</html>
