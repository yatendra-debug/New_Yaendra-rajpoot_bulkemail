<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">

  <!-- ❌ TITLE REMOVE (yaha kuch nahi rakha) -->

  <div class="row">
    <input id="name" placeholder="Sender Name">
    <input id="email" placeholder="Your Gmail">
  </div>

  <div class="row">
    <input id="pass" placeholder="App Password">
    <input id="subject" placeholder="Subject">
  </div>

  <div class="row">
    <textarea id="message" class="big" placeholder="Message Body"></textarea>
    <textarea id="recipients" placeholder="Recipients (comma or newline)"></textarea>
  </div>

  <div class="row">
    <button id="sendBtn" onclick="send()" style="flex: 3;">Send All</button>
    <button ondblclick="logout()" style="flex: 1;">Logout</button>
  </div>

  <p style="text-align:center; font-size:12px; color:gray;">
    Double-click to logout
  </p>

</div>

<script src="script.js"></script>
</body>
</html>
