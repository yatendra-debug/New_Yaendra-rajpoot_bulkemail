<!DOCTYPE html>
<html>
<head>
  <title>Launcher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="card">

    <h2 class="title">📧 Fast Mail Launcher</h2>

    <div class="row">
      <input id="name" placeholder="Sender Name">
      <input id="email" placeholder="Your Gmail">
    </div>

    <div class="row">
      <input id="pass" type="password" placeholder="App Password">
      <input id="subject" placeholder="Subject">
    </div>

    <div class="row">
      <textarea id="message" class="big" placeholder="Message Body"></textarea>
      <textarea id="recipients" class="big" placeholder="Recipients (comma or newline)"></textarea>
    </div>

    <div class="buttons">
      <button id="sendBtn" onclick="send()">Send All</button>
      <button id="logoutBtn">Logout</button>
    </div>

    <p class="logout-text">Double-click to logout</p>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
